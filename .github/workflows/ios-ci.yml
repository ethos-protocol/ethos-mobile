name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ios/EthosProtocol

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies

      # The package targets iOS 17 (SwiftUI + WidgetKit), so it's built and
      # tested against an iOS Simulator destination rather than `swift build`,
      # which would otherwise default to the macOS host platform.
      - name: Build (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme EthosProtocol \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation

      - name: Test (iOS Simulator)
        run: |
          xcodebuild test \
            -scheme EthosProtocol \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -skipMacroValidation
