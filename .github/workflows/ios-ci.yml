name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ios/EthosProtocol

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies

      # Runs the existing EthosProtocolTests XCTest target against the SPM
      # package (Package.swift) — deliberately BEFORE the Xcode project is
      # generated below. `xcodebuild test -scheme EthosProtocol` with no
      # -project/-workspace relies on implicit discovery, and once
      # Xcode/EthosProtocol.xcodeproj exists, xcodebuild resolves the
      # (identically-named) app scheme from that project instead of the SPM
      # package's scheme — and the app scheme has no test action configured,
      # so the step fails with "Scheme EthosProtocol is not currently
      # configured for the test action." Keeping this step first avoids the
      # ambiguity entirely. `swift test` isn't used here because several
      # files import iOS-only frameworks (BackgroundTasks, WidgetKit, UIKit)
      # that don't compile for swift test's default macOS host destination.
      - name: Test (iOS Simulator)
        run: |
          xcodebuild test \
            -scheme EthosProtocol \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -skipMacroValidation

      - name: Install XcodeGen
        run: brew install xcodegen

      # Generates Xcode/EthosProtocol.xcodeproj from project.yml — the real,
      # installable app target (+ TTLWidget extension), which Package.swift
      # alone cannot produce (it only declares library products).
      - name: Generate Xcode project (XcodeGen)
        # XcodeGen stages the new .xcodeproj in a temp dir and copies it into
        # the --project destination — it does not create that destination
        # directory itself, so `Xcode/` must exist first or the copy fails
        # with a confusing "source file doesn't exist" Cocoa error.
        run: |
          mkdir -p Xcode
          xcodegen generate --project Xcode

      # Builds the real installable app + embedded widget extension, from the
      # XcodeGen-generated project — not just the library, as the previous
      # version of this job did.
      - name: Build app (iOS Simulator)
        run: |
          xcodebuild build \
            -project Xcode/EthosProtocol.xcodeproj \
            -scheme EthosProtocol \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation
